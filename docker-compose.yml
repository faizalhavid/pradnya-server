services:
  postgres:
    image: postgres:17
    container_name: pradnya-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pradnya_db

    ports:
    - "5433:5432"
      
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

  # psql -h localhost -p 5432 -d pradnya_db -U postgres